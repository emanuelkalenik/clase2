<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✦ Mundo Poligonal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #0a0a1a;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas { display: block; }

    /* Overlay de inicio */
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #0d0d2b, #050510);
      z-index: 100;
      opacity: 1;
      transition: opacity 1.2s ease;
      pointer-events: auto;
    }
    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #overlay h1 {
      font-size: clamp(2rem, 6vw, 4.5rem);
      font-weight: 300;
      color: #d4d4f0;
      letter-spacing: 0.1em;
      text-shadow: 0 0 60px rgba(150, 130, 255, 0.15);
      margin-bottom: 0.4rem;
    }
    #overlay .sub {
      font-size: clamp(0.8rem, 1.8vw, 1.2rem);
      color: #8888bb;
      font-weight: 300;
      letter-spacing: 0.4em;
      margin-bottom: 2.5rem;
    }
    #startBtn {
      background: linear-gradient(135deg, rgba(180, 160, 255, 0.15), rgba(130, 200, 255, 0.15));
      border: 1px solid rgba(180, 160, 255, 0.25);
      color: #c8c8ee;
      font-size: clamp(0.9rem, 1.4vw, 1.1rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      padding: 0.9rem 2.8rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.6s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      background-color: rgba(20, 18, 50, 0.5);
    }
    #startBtn:hover {
      background: linear-gradient(135deg, rgba(180, 160, 255, 0.25), rgba(130, 200, 255, 0.25));
      border-color: rgba(200, 180, 255, 0.5);
      box-shadow: 0 0 40px rgba(150, 130, 255, 0.15);
      transform: scale(1.03);
    }
    #startBtn:active {
      transform: scale(0.97);
    }

    /* HUD */
    #hud {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(200, 200, 240, 0.4);
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-align: center;
      pointer-events: none;
      transition: opacity 2s ease;
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
    }
    #hud span {
      display: inline-block;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    /* Nota flotante */
    .note-label {
      position: fixed;
      pointer-events: none;
      color: rgba(220, 210, 255, 0.7);
      font-size: 1.3rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      text-shadow: 0 0 30px rgba(150, 130, 255, 0.3);
      animation: floatUp 1.2s ease-out forwards;
      z-index: 10;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(0.8); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      #overlay h1 { font-size: 2.2rem; }
      #overlay .sub { font-size: 0.7rem; }
      #startBtn { padding: 0.7rem 2rem; font-size: 0.85rem; }
      #hud { bottom: 1.5rem; font-size: 0.6rem; }
    }
  </style>
</head>
<body>

  <!-- Overlay de inicio -->
  <div id="overlay">
    <h1>✦ Mundo Poligonal</h1>
    <div class="sub">Un jardín de criaturas de cristal</div>
    <button id="startBtn">Tocar para entrar</button>
  </div>

  <!-- HUD -->
  <div id="hud"><span>✦ Haz clic en las criaturas para despertar sus sonidos ✦</span></div>

  <!-- Import Map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/",
      "tone": "https://cdn.jsdelivr.net/npm/tone@14.8.49/build/esm/Tone.js"
    }
  }
  </script>

  <!-- Main script -->
  <script type="module">
    // ============================================================
    // IMPORTS
    // ============================================================
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import * as Tone from 'tone';

    // ============================================================
    // CONSTANTS
    // ============================================================
    const PENTATONIC = ['C4', 'D4', 'E4', 'G4', 'A4', 'C5', 'D5', 'E5', 'G5', 'A5'];
    const CREATURE_COUNT = 18;
    const COLORS = [
      '#FFB5C8', '#B5D8FF', '#A8E6CF', '#FFD6A5',
      '#D4B5FF', '#FDFFB6', '#B5F0FF', '#FFC8E8',
      '#B8F2E6', '#E8C8FF', '#FFE5B4', '#B5E8FF',
    ];

    // ============================================================
    // DOM REFS
    // ============================================================
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const hud = document.getElementById('hud');

    // ============================================================
    // SCENE SETUP
    // ============================================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);
    scene.fog = new THREE.Fog(0x0a0a1a, 12, 30);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50);
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false,
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.prepend(renderer.domElement);

    // === CONTROLS ===
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.8;
    controls.minDistance = 4;
    controls.maxDistance = 25;
    controls.maxPolarAngle = Math.PI / 2.2;
    controls.target.set(0, 0.5, 0);

    // ============================================================
    // LIGHTING
    // ============================================================
    const ambientLight = new THREE.AmbientLight(0x222244, 0.5);
    scene.add(ambientLight);

    const hemiLight = new THREE.HemisphereLight(0x8888ff, 0x443366, 0.8);
    scene.add(hemiLight);

    const mainLight = new THREE.DirectionalLight(0xffeedd, 1.8);
    mainLight.position.set(5, 12, 8);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.width = 1024;
    mainLight.shadow.mapSize.height = 1024;
    scene.add(mainLight);

    const fillLight = new THREE.DirectionalLight(0x8888ff, 0.6);
    fillLight.position.set(-5, 3, -5);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xcc88ff, 0.4);
    rimLight.position.set(0, -3, -8);
    scene.add(rimLight);

    // ============================================================
    // GROUND
    // ============================================================
    // Low-poly circular platform
    const groundGeo = new THREE.CylinderGeometry(6.5, 6.5, 0.2, 48, 1);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x181835,
      roughness: 0.7,
      metalness: 0.2,
      transparent: true,
      opacity: 0.85,
      emissive: 0x222244,
      emissiveIntensity: 0.08,
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.position.y = -0.6;
    ground.receiveShadow = true;
    scene.add(ground);

    // Ring glow around platform
    const ringGeo = new THREE.TorusGeometry(6.5, 0.04, 16, 64);
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0x6666aa,
      transparent: true,
      opacity: 0.3,
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.y = -0.45;
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);

    // Inner ring
    const ring2Geo = new THREE.TorusGeometry(5.8, 0.02, 16, 64);
    const ring2Mat = new THREE.MeshBasicMaterial({
      color: 0x8888cc,
      transparent: true,
      opacity: 0.15,
    });
    const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
    ring2.position.y = -0.40;
    ring2.rotation.x = Math.PI / 2;
    scene.add(ring2);

    // ============================================================
    // STARS / PARTICLES (background)
    // ============================================================
    const starCount = 800;
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(starCount * 3);
    const starSizes = new Float32Array(starCount);
    for (let i = 0; i < starCount; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 15 + Math.random() * 30;
      starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      starPos[i * 3 + 1] = Math.abs(r * Math.cos(phi)) * 0.6;
      starPos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
      starSizes[i] = 0.3 + Math.random() * 1.0;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

    const starMat = new THREE.PointsMaterial({
      color: 0x8888cc,
      size: 0.08,
      transparent: true,
      opacity: 0.6,
      blending: THREE.AdditiveBlending,
      sizeAttenuation: true,
    });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // ============================================================
    // FLOATING AMBIENT PARTICLES
    // ============================================================
    const particleCount = 300;
    const particleGeo = new THREE.BufferGeometry();
    const particlePos = new Float32Array(particleCount * 3);
    const particlePhases = new Float32Array(particleCount);
    const particleSpeeds = new Float32Array(particleCount);
    for (let i = 0; i < particleCount; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = 1 + Math.random() * 5;
      particlePos[i * 3] = Math.cos(angle) * radius + (Math.random() - 0.5) * 2;
      particlePos[i * 3 + 1] = -0.3 + Math.random() * 5;
      particlePos[i * 3 + 2] = Math.sin(angle) * radius + (Math.random() - 0.5) * 2;
      particlePhases[i] = Math.random() * Math.PI * 2;
      particleSpeeds[i] = 0.3 + Math.random() * 0.7;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));

    const particleMat = new THREE.PointsMaterial({
      color: 0xaaaadd,
      size: 0.04,
      transparent: true,
      opacity: 0.4,
      blending: THREE.AdditiveBlending,
      sizeAttenuation: true,
    });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // Store particle data for animation
    const particleData = { phases: particlePhases, speeds: particleSpeeds, positions: particlePos, count: particleCount };

    // ============================================================
    // CREATURES
    // ============================================================
    const geometries = {
      tetrahedron: new THREE.TetrahedronGeometry(1, 0),
      octahedron: new THREE.OctahedronGeometry(1, 0),
      dodecahedron: new THREE.DodecahedronGeometry(1, 0),
      icosahedron: new THREE.IcosahedronGeometry(1, 0),
    };

    const typeNames = Object.keys(geometries);

    class Creature {
      constructor(index) {
        this.index = index;
        this.type = typeNames[index % typeNames.length];
        this.size = 0.3 + Math.random() * 0.5;
        this.colorHex = COLORS[index % COLORS.length];
        this.color = new THREE.Color(this.colorHex);

        // Geometry with wireframe edges
        const geo = geometries[this.type].clone();
        const mat = new THREE.MeshStandardMaterial({
          color: this.color,
          roughness: 0.25,
          metalness: 0.6,
          emissive: this.color,
          emissiveIntensity: 0.15,
          flatShading: true,
          transparent: true,
          opacity: 0.92,
        });
        this.mesh = new THREE.Mesh(geo, mat);
        this.mesh.scale.set(this.size, this.size, this.size);
        this.mesh.castShadow = true;

        // Wireframe overlay
        const wireMat = new THREE.MeshBasicMaterial({
          color: this.color,
          wireframe: true,
          transparent: true,
          opacity: 0.2,
        });
        this.wireframe = new THREE.Mesh(geo.clone(), wireMat);
        this.wireframe.scale.set(this.size * 1.01, this.size * 1.01, this.size * 1.01);
        this.mesh.add(this.wireframe);

        // Glow aura (inner)
        const glowMat = new THREE.MeshBasicMaterial({
          color: this.color,
          transparent: true,
          opacity: 0.06,
          blending: THREE.AdditiveBlending,
        });
        this.glow = new THREE.Mesh(geo.clone(), glowMat);
        this.glow.scale.set(1.6, 1.6, 1.6);
        this.mesh.add(this.glow);

        // Position in a ring
        const angle = (index / CREATURE_COUNT) * Math.PI * 2 + Math.random() * 0.3;
        const radius = 1.5 + Math.random() * 3.5;
        this.basePos = new THREE.Vector3(
          Math.cos(angle) * radius,
          0.5 + Math.random() * 2.0,
          Math.sin(angle) * radius
        );
        this.mesh.position.copy(this.basePos);

        // Movement params
        this.speed = 0.2 + Math.random() * 0.5;
        this.freq = {
          x: 0.3 + Math.random() * 0.8,
          y: 0.2 + Math.random() * 0.6,
          z: 0.3 + Math.random() * 0.7,
        };
        this.phase = {
          x: Math.random() * Math.PI * 2,
          y: Math.random() * Math.PI * 2,
          z: Math.random() * Math.PI * 2,
        };
        this.wanderRadius = 0.3 + Math.random() * 0.8;
        this.bobSpeed = 0.4 + Math.random() * 0.6;
        this.bobAmount = 0.1 + Math.random() * 0.25;
        this.rotSpeed = new THREE.Vector3(
          (Math.random() - 0.5) * 0.5,
          (Math.random() - 0.5) * 0.7,
          (Math.random() - 0.5) * 0.3,
        );

        // Sound
        this.note = PENTATONIC[index % PENTATONIC.length];

        // Interaction state
        this.isHovered = false;
        this.pulseTime = 0;
        this.originalScale = this.size;

        scene.add(this.mesh);
      }

      update(time, dt) {
        const t = time * this.speed;

        // Organic floating movement
        this.mesh.position.x = this.basePos.x + Math.sin(t * this.freq.x + this.phase.x) * this.wanderRadius;
        this.mesh.position.y = this.basePos.y + Math.sin(t * this.freq.y + this.phase.y) * this.wanderRadius
          + Math.sin(t * this.bobSpeed) * this.bobAmount;
        this.mesh.position.z = this.basePos.z + Math.sin(t * this.freq.z + this.phase.z) * this.wanderRadius;

        // Rotation
        this.mesh.rotation.x += this.rotSpeed.x * dt;
        this.mesh.rotation.y += this.rotSpeed.y * dt;
        this.mesh.rotation.z += this.rotSpeed.z * dt;

        // Pulse animation (after click)
        if (this.pulseTime > 0) {
          this.pulseTime -= dt;
          const p = this.pulseTime / 1.0; // 1 second pulse duration
          const scale = this.originalScale + Math.sin(p * Math.PI) * 0.15;
          this.mesh.scale.set(scale, scale, scale);
          this.mesh.material.emissiveIntensity = 0.15 + Math.sin(p * Math.PI) * 0.5;
        } else {
          this.mesh.scale.set(this.originalScale, this.originalScale, this.originalScale);
          this.mesh.material.emissiveIntensity = 0.15;
        }

        // Hover glow
        if (this.isHovered) {
          this.mesh.material.emissiveIntensity = 0.4;
          this.mesh.scale.set(
            this.originalScale * 1.08,
            this.originalScale * 1.08,
            this.originalScale * 1.08
          );
        }
      }

      playNote() {
        this.pulseTime = 1.0;
        playCreatureSound(this.note, this.colorHex);
        showNoteLabel(this.note, this.mesh.position.clone());
      }

      setHovered(val) {
        this.isHovered = val;
        document.body.style.cursor = val ? 'pointer' : 'default';
      }
    }

    // Create all creatures
    const creatures = [];
    for (let i = 0; i < CREATURE_COUNT; i++) {
      creatures.push(new Creature(i));
    }

    // ============================================================
    // AUDIO SETUP (Tone.js)
    // ============================================================
    let audioReady = false;
    let mainSynth = null;
    let reverb = null;
    let ambientSynth = null;
    let ambientInterval = null;

    async function initAudio() {
      if (audioReady) return;
      
      try {
        await Tone.start();
        console.log('[Audio] Tone.js started, context state:', Tone.context.state);
      } catch(e) {
        console.error('[Audio] Tone.start() failed:', e);
        // Fallback: try to resume the raw AudioContext
        try {
          if (Tone.context && Tone.context.rawContext) {
            await Tone.context.rawContext.resume();
            console.log('[Audio] rawContext resumed:', Tone.context.state);
          }
        } catch(e2) {
          console.error('[Audio] Fallback resume also failed:', e2);
        }
      }

      // Create main reverb
      reverb = new Tone.Reverb({
        decay: 3,
        wet: 0.4,
        preDelay: 0.05,
      }).toDestination();

      // Main synth for creature sounds - simpler setup
      mainSynth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: 'triangle' },
        envelope: {
          attack: 0.02,
          decay: 0.2,
          sustain: 0.3,
          release: 0.8,
        },
        volume: -6,
      }).connect(reverb);

      // Ambient synth - soft pad
      ambientSynth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: 'sine' },
        envelope: {
          attack: 1.0,
          decay: 0.3,
          sustain: 0.2,
          release: 4,
        },
        volume: -15,
      }).connect(reverb);

      console.log('[Audio] Synths created successfully');

      // Play a test sound to verify audio works
      try {
        mainSynth.triggerAttackRelease('C5', '8n', Tone.now(), 0.3);
        setTimeout(() => {
          mainSynth.triggerAttackRelease('E5', '8n', Tone.now(), 0.3);
        }, 200);
        console.log('[Audio] Test beep played!');
      } catch(e) {
        console.error('[Audio] Test beep failed:', e);
      }

      // Start ambient generator after a short delay
      setTimeout(() => startAmbient(), 1000);

      audioReady = true;
    }

    function startAmbient() {
      // Play soft ambient notes at random intervals
      const ambientNotes = ['C3', 'E3', 'G3', 'A3', 'C4', 'E4', 'G4'];
      function scheduleAmbient() {
        if (!audioReady) return;
        const note = ambientNotes[Math.floor(Math.random() * ambientNotes.length)];
        const duration = 2 + Math.random() * 3;
        const time = Math.random() * 2;
        try {
          ambientSynth.triggerAttackRelease(note, duration, Tone.now() + time, 0.2 + Math.random() * 0.3);
        } catch(e) { console.warn('Ambient error:', e); }
        const nextDelay = 2 + Math.random() * 6;
        ambientInterval = setTimeout(scheduleAmbient, nextDelay * 1000);
      }
      scheduleAmbient();
    }

    function playCreatureSound(note, colorHex) {
      if (!audioReady) return;
      try {
        // Main note
        mainSynth.triggerAttackRelease(note, '4n', Tone.now(), 0.5 + Math.random() * 0.3);

        // Soft harmonic overtone after a brief delay
        const noteIndex = PENTATONIC.indexOf(note);
        const harmonicIdx = Math.min(noteIndex + 2, PENTATONIC.length - 1);
        const harmonicNote = PENTATONIC[harmonicIdx];
        if (harmonicNote) {
          mainSynth.triggerAttackRelease(harmonicNote, '2n', Tone.now() + 0.12, 0.15);
        }
      } catch(e) {
        console.warn('Sound error:', e);
      }
    }

    // ============================================================
    // NOTE LABEL UI
    // ============================================================
    function showNoteLabel(note, worldPos) {
      const el = document.createElement('div');
      el.className = 'note-label';
      el.textContent = '♪ ' + note;
      document.body.appendChild(el);

      // Convert 3D position to screen coordinates
      const vec = worldPos.clone();
      vec.project(camera);
      const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-vec.y * 0.5 + 0.5) * window.innerHeight;
      el.style.left = x + 'px';
      el.style.top = y + 'px';

      setTimeout(() => el.remove(), 1300);
    }

    // ============================================================
    // INTERACTION (Raycaster)
    // ============================================================
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function getIntersects(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);

      const meshes = creatures.map(c => c.mesh);
      return raycaster.intersectObjects(meshes);
    }

    // Click handler
    renderer.domElement.addEventListener('click', (event) => {
      const intersects = getIntersects(event);
      if (intersects.length > 0) {
        const hit = intersects[0].object;
        const creature = creatures.find(c => c.mesh === hit);
        if (creature) {
          creature.playNote();
        }
      }
    });

    // Hover handler
    renderer.domElement.addEventListener('pointermove', (event) => {
      const intersects = getIntersects(event);
      const hitCreature = intersects.length > 0
        ? creatures.find(c => c.mesh === intersects[0].object)
        : null;

      creatures.forEach(c => c.setHovered(c === hitCreature));
    });

    // ============================================================
    // RESIZE
    // ============================================================
    window.addEventListener('resize', () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });

    // Keyboard shortcuts
    window.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        // Play a random creature
        const creature = creatures[Math.floor(Math.random() * creatures.length)];
        creature.playNote();
      }
    });

    // ============================================================
    // START EXPERIENCE
    // ============================================================
    startBtn.addEventListener('click', async () => {
      await initAudio();
      overlay.classList.add('hidden');
      setTimeout(() => {
        overlay.style.display = 'none';
      }, 1300);
      setTimeout(() => {
        hud.style.opacity = '0';
        setTimeout(() => { hud.style.display = 'none'; }, 2000);
      }, 8000);
    });

    // ============================================================
    // ANIMATION LOOP
    // ============================================================
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);
      const elapsed = clock.elapsedTime;

      // Update creatures
      creatures.forEach(c => c.update(elapsed, dt));

      // Animate ambient particles
      const pos = particles.geometry.attributes.position.array;
      for (let i = 0; i < particleData.count; i++) {
        const i3 = i * 3;
        pos[i3 + 1] += Math.sin(elapsed * particleData.speeds[i] + particleData.phases[i]) * 0.002;
        // Gentle horizontal drift
        pos[i3] += Math.sin(elapsed * 0.2 + particleData.phases[i]) * 0.001;
        pos[i3 + 2] += Math.cos(elapsed * 0.2 + particleData.phases[i]) * 0.001;
      }
      particles.geometry.attributes.position.needsUpdate = true;

      // Gentle star twinkle
      stars.rotation.y += dt * 0.003;

      // Ring pulse
      const ringPulse = 0.3 + Math.sin(elapsed * 0.3) * 0.1;
      ring.material.opacity = ringPulse;
      ring2.material.opacity = ringPulse * 0.5;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    console.log('✦ Mundo Poligonal iniciado - ' + CREATURE_COUNT + ' criaturas');
  </script>
</body>
</html>
